# Standalone compose file for config_store.
# Run from this directory:
#   docker compose up --build
#
# - Builds only the config_store image.
# - Pulls in a MongoDB sidecar and MySQL sidecar so the service is fully runnable on its own.
# - Source is bind-mounted for hot reload.
# - MongoDB and MySQL data live on named volumes.
#
# Host ports:
#   config_store : 8002 -> 8002

services:
  mysql:
    image: mysql:8.0
    container_name: live_algo_config_store_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: config_store
      MYSQL_USER: config_store
      MYSQL_PASSWORD: config_store_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  config_store:
    build:
      context: .
      dockerfile: Dockerfile
    image: live_algo/config_store:latest
    container_name: live_algo_config_store
    working_dir: /app
    command:
      - "uvicorn"
      - "main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8002"
      - "--reload"
    environment:
      CONFIG_STORE_PORT: "8002"
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      MONGO_COLLECTION: ${MONGO_COLLECTION}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: config_store
      MYSQL_PASSWORD: config_store_password
      MYSQL_DATABASE: config_store
      SYNC_INTERVAL: ${SYNC_INTERVAL}
    ports:
      - "8002:8002"
    volumes:
      - .:/app
      - config_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  config_data:
  mysql_data: