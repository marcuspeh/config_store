# Standalone compose file for config_store.
# Run from this directory:
#   docker compose up --build
#
# - Builds only the config_store image.
# - Requires external MongoDB and MySQL instances.
# - Source is bind-mounted for hot reload.
#
# Host ports:
#   config_store : 6002 -> 6002

services:
  config_store:
    build:
      context: .
      dockerfile: Dockerfile

    image: live_algo/config_store:latest
    container_name: live_algo_config_store
    restart: unless-stopped
    working_dir: /app

    command:
      - "uv"
      - "run"
      - "uvicorn"
      - "main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "6002"
      - "--reload"

    environment:
      CONFIG_STORE_PORT: "6002"
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      MONGO_COLLECTION: ${MONGO_COLLECTION}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SYNC_INTERVAL: ${SYNC_INTERVAL}
      
    volumes:
      - .:/app

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:6002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - app-net

networks:
  app-net:
    external: true
